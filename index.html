<!DOCTYPE html>
<html>
<head>
  <title>Chaos Pets Prototype</title>
  <style>
    canvas { background: #87CEEB; display: block; margin: auto; }
  </style>
</head>
<body>

<canvas id="game" width="800" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// PLAYER
let player = { x: 400, y: 250, size: 20, speed: 3, coins: 0 };

// COINS
let coins = [];
const maxCoins = 20;
for (let i = 0; i < maxCoins; i++) {
  coins.push({ x: Math.random() * 800, y: Math.random() * 500, size: 10 });
}

// PETS
let pets = [];

// CONTROLS
let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// HATCH PET
function hatchPet() {
  if (player.coins < 10) return;

  player.coins -= 10;

  const types = ["frog", "magnet", "dragon"];
  let type = types[Math.floor(Math.random() * types.length)];

  pets.push({
    type: type,
    angle: Math.random() * Math.PI * 2,
    radius: 30 + Math.random() * 20,
    speed: 0.02 + Math.random() * 0.02
  });
}

// PET EFFECTS
function updatePets() {
  pets.forEach(pet => {
    // orbit animation
    pet.angle += pet.speed;
    pet.x = player.x + Math.cos(pet.angle) * pet.radius;
    pet.y = player.y + Math.sin(pet.angle) * pet.radius;

    if (pet.type === "frog") {
      // small random jumps
      if (Math.random() < 0.005) player.y -= 50;
    }

    if (pet.type === "magnet") {
      // pull coins
      coins.forEach(c => {
        let dx = player.x - c.x;
        let dy = player.y - c.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 100) {
          c.x += dx * 0.05;
          c.y += dy * 0.05;
        }
      });
    }

    if (pet.type === "dragon") {
      // auto collect nearby coins
      coins = coins.filter(c => {
        let dx = player.x - c.x;
        let dy = player.y - c.y;
        if (Math.sqrt(dx*dx + dy*dy) < 50) {
          player.coins++;
          return false;
        }
        return true;
      });
    }
  });
}

// COIN RESPAWN
function spawnCoins() {
  if (coins.length < maxCoins) {
    coins.push({
      x: Math.random() * 800,
      y: Math.random() * 500,
      size: 10
    });
  }
}

// GAME LOOP
function update() {
  // movement
  if (keys["w"]) player.y -= player.speed;
  if (keys["s"]) player.y += player.speed;
  if (keys["a"]) player.x -= player.speed;
  if (keys["d"]) player.x += player.speed;

  // collect coins
  coins = coins.filter(c => {
    let dx = player.x - c.x;
    let dy = player.y - c.y;
    if (Math.sqrt(dx*dx + dy*dy) < player.size) {
      player.coins++;
      return false;
    }
    return true;
  });

  updatePets();
  spawnCoins();
}

// DRAW
function draw() {
  ctx.clearRect(0, 0, 800, 500);

  // player
  ctx.fillStyle = "blue";
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
  ctx.fill();

  // coins
  ctx.fillStyle = "yellow";
  coins.forEach(c => {
    ctx.beginPath();
    ctx.arc(c.x, c.y, c.size, 0, Math.PI * 2);
    ctx.fill();
  });

  // pets
  pets.forEach(pet => {
    if (pet.type === "frog") ctx.fillStyle = "green";
    else if (pet.type === "magnet") ctx.fillStyle = "orange";
    else if (pet.type === "dragon") ctx.fillStyle = "red";

    ctx.beginPath();
    ctx.arc(pet.x, pet.y, 10, 0, Math.PI * 2);
    ctx.fill();
  });

  // UI
  ctx.fillStyle = "black";
  ctx.font = "16px Arial";
  ctx.fillText("Coins: " + player.coins, 10, 20);
  ctx.fillText("Press SPACE to hatch (10 coins)", 10, 40);
}

// INPUT
document.addEventListener("keydown", e => {
  if (e.code === "Space") hatchPet();
});

// LOOP
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
